<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b14;
  --surface:#0d1422;
  --surface2:#111827;
  --border:rgba(80,110,160,0.2);
  --cyan:#22d3ee;
  --blue:#3b82f6;
  --violet:#8b5cf6;
  --indigo:#6366f1;
  --green:#34d399;
  --amber:#fbbf24;
  --text:#e6edf7;
  --muted:#7d8aa3;
  --subtle:#4a5568;
}
body{font-family:'Avenir Next','Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(ellipse 900px 500px at 5% -5%, rgba(34,211,238,0.07), transparent 60%),
    radial-gradient(ellipse 800px 600px at 95% 100%, rgba(99,102,241,0.08), transparent 60%);
}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;border-bottom:1px solid var(--border);
  background:rgba(7,11,20,0.9);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:14px;}
.logo{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#22d3ee,#3b82f6 55%,#6366f1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(56,189,248,0.4);flex:none;
}
.logo svg{width:22px;height:22px;}
.brand-text h1{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.brand-text h1 span{background:linear-gradient(135deg,#67e8f9,#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand-text p{font-size:11px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:12px;}
.badge{font-size:11px;padding:5px 12px;border-radius:999px;font-weight:600;border:1px solid;}
.badge-live{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:#6ee7b7;display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ===== DEMO SELECTOR ===== */
.demo-selector{
  display:flex;align-items:center;gap:0;
  background:rgba(13,20,34,0.8);border:1px solid var(--border);
  border-radius:12px;padding:4px;
}
.demo-tab{
  padding:8px 20px;border-radius:9px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;color:var(--muted);border:none;background:none;
}
.demo-tab.active{background:linear-gradient(135deg,rgba(34,211,238,0.15),rgba(99,102,241,0.15));color:var(--text);border:1px solid rgba(99,130,180,0.25);}
.demo-tab:hover:not(.active){color:var(--text);}

/* ===== MAIN LAYOUT ===== */
.layout{display:flex;height:calc(100vh - 73px);overflow:hidden;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:280px;flex:none;border-right:1px solid var(--border);
  padding:24px 0;overflow-y:auto;
  background:rgba(10,15,26,0.6);
  height:100%;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(34,211,238,0.06);border-left-color:var(--cyan);}
.nav-num{
  width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;flex:none;
}
.nav-label{font-size:13px;font-weight:500;color:var(--muted);line-height:1.3;}
.nav-status{margin-left:auto;width:7px;height:7px;border-radius:50%;flex:none;background:rgba(255,255,255,0.1);}
.nav-status.done{background:var(--green);}
.nav-status.current{background:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.5);}
.nav-divider{height:1px;background:var(--border);margin:12px 20px;}
.phase-label{display:flex;align-items:center;gap:8px;padding:6px 20px;margin-top:4px;}
.phase-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.8px;}
.phase-op{background:rgba(34,211,238,0.12);color:#67e8f9;border:1px solid rgba(34,211,238,0.25);}
.phase-pr{background:rgba(139,92,246,0.12);color:#c4b5fd;border:1px solid rgba(139,92,246,0.25);}
.phase-eu{background:rgba(52,211,153,0.12);color:#6ee7b7;border:1px solid rgba(52,211,153,0.25);}
.phase-fn{background:rgba(251,191,36,0.12);color:#fde68a;border:1px solid rgba(251,191,36,0.25);}

/* ===== CONTENT ===== */
.content{flex:1;padding:32px 36px;overflow-y:auto;height:100%;}
.content-inner{max-width:960px;margin:0 auto;}

/* ===== STEP HEADER ===== */
.step-header{margin-bottom:28px;}
.step-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.step-phase-tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:0.8px;}
.step-num-tag{font-size:11px;color:var(--muted);}
.step-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;margin-bottom:8px;}
.step-subtitle{font-size:14px;color:var(--muted);line-height:1.6;max-width:640px;}

/* ===== CARDS ===== */
.card{
  background:linear-gradient(180deg,rgba(17,24,39,0.8),rgba(10,15,26,0.8));
  border:1px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.card-cyan::before{background:linear-gradient(90deg,var(--cyan),var(--blue));}
.card-violet::before{background:linear-gradient(90deg,var(--violet),var(--indigo));}
.card-green::before{background:linear-gradient(90deg,var(--green),var(--cyan));}
.card-amber::before{background:linear-gradient(90deg,var(--amber),#f97316);}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title svg{width:15px;height:15px;}

/* ===== GRIDS ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* ===== STEPS LIST ===== */
.steps-list{display:flex;flex-direction:column;gap:12px;}
.step-item{
  display:flex;gap:14px;align-items:flex-start;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:14px 16px;transition:all 0.15s;cursor:pointer;
}
.step-item:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);}
.step-item.highlighted{background:rgba(34,211,238,0.05);border-color:rgba(34,211,238,0.2);}
.step-circle{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex:none;margin-top:1px;
}
.step-body{flex:1;}
.step-body strong{font-size:14px;font-weight:600;display:block;margin-bottom:4px;}
.step-body p{font-size:13px;color:var(--muted);line-height:1.5;}
.step-note{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);
  border-radius:8px;padding:10px 12px;margin-top:8px;
}
.step-note svg{width:14px;height:14px;color:#fbbf24;flex:none;margin-top:1px;}
.step-note span{font-size:12px;color:#fde68a;line-height:1.5;}

/* ===== METRIC CHIPS ===== */
.metric-chip{background:rgba(20,29,48,0.7);border:1px solid rgba(90,120,170,0.2);border-radius:12px;padding:16px;text-align:center;}
.metric-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.metric-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.08);margin-top:10px;overflow:hidden;}
.metric-fill{height:100%;border-radius:2px;}

/* ===== TAG CHIPS ===== */
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.tag-chip{font-size:12px;font-weight:500;padding:5px 12px;border-radius:999px;border:1px solid;background:rgba(255,255,255,0.04);}

/* ===== CODE BLOCK ===== */
.code-block{
  background:#0a0f1a;border:1px solid rgba(80,110,160,0.25);
  border-radius:10px;padding:16px;font-family:'Courier New',monospace;
  font-size:12.5px;color:#a5f3fc;line-height:1.7;overflow-x:auto;position:relative;
  white-space:pre;
}
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);
  padding:8px 16px;border-radius:10px 10px 0 0;margin:-16px -16px 12px;
}
.code-dots{display:flex;gap:6px;}
.code-dot{width:8px;height:8px;border-radius:50%;}
.code-lang{font-size:11px;color:var(--muted);font-family:'Avenir Next','Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',Arial,sans-serif;}
.code-block .kw{color:#818cf8;}
.code-block .str{color:#6ee7b7;}
.code-block .cm{color:#4a5568;}

/* ===== PRESENTER NOTES ===== */
.presenter-box{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:14px;padding:20px 22px;margin-top:8px;}
.presenter-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fbbf24;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.presenter-title svg{width:14px;height:14px;}
.talk-track{display:flex;flex-direction:column;gap:10px;}
.talk-item{display:flex;gap:10px;align-items:flex-start;}
.talk-icon{font-size:14px;flex:none;margin-top:1px;}
.talk-item p{font-size:13px;color:#fde68a;line-height:1.6;}
.talk-item strong{color:#fff;}

/* ===== FAQ ===== */
.faq-card{
  background:linear-gradient(180deg,rgba(17,24,39,0.82),rgba(10,15,26,0.82));
  border:1px solid rgba(80,110,160,0.24);
  border-radius:16px;
  padding:22px 24px;
  margin:20px 0 24px;
  position:relative;
  overflow:hidden;
}
.faq-card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--amber),var(--violet));
}
.faq-title{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;
  color:#e6edf7;margin-bottom:16px;
}
.faq-title::before{
  content:"?";
  width:22px;height:22px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(251,191,36,0.12);
  border:1px solid rgba(251,191,36,0.35);
  color:#fde68a;font-size:13px;font-weight:900;
}
.faq-list{display:grid;grid-template-columns:1fr;gap:14px;}
.faq-item{
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;
  padding:16px 18px;
}
.faq-head{
  display:flex;align-items:flex-start;gap:8px;
  margin-bottom:8px;
}
.faq-q{
  flex:1;font-size:15px;font-weight:750;
  color:var(--text);line-height:1.55;
}
.faq-a{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:10px;
  font-size:14px;color:#a8b3c8;
  line-height:1.75;
  border-left:2px solid rgba(34,211,238,0.18);
  padding-left:12px;
  margin-top:8px;
}
.faq-a-label{
  color:#67e8f9;
  font-size:13px;
  font-weight:800;
  letter-spacing:0.4px;
}
.faq-a-body{
  min-width:0;
}
.faq-a-body p{
  margin:0;
}
.faq-a-body p + p{
  margin-top:10px;
}
.faq-evidence{
  margin-top:14px;
  border:1px solid rgba(80,110,160,0.22);
  border-radius:12px;
  overflow:hidden;
  background:rgba(6,10,18,0.55);
}
.faq-evidence img{
  width:100%;
  display:block;
  max-height:320px;
  object-fit:cover;
  object-position:top;
}
/* ===== FEATURE GRID ===== */
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px;}
.feature-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;}
.feature-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.feature-icon svg{width:18px;height:18px;}
.feature-item h4{font-size:13px;font-weight:700;margin-bottom:4px;}
.feature-item p{font-size:12px;color:var(--muted);line-height:1.5;}

/* ===== FLOW DIAGRAM ===== */
.flow-row{display:flex;align-items:center;gap:8px;margin:16px 0;}
.flow-node{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;text-align:center;font-size:12px;font-weight:600;}
.flow-arrow{color:var(--muted);font-size:18px;flex:none;}
.flow-node.active-node{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.3);color:#67e8f9;}

/* ===== NAV BUTTONS ===== */
.nav-buttons{display:flex;align-items:center;justify-content:space-between;margin-top:32px;padding-top:24px;border-top:1px solid var(--border);}
.btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text);}
.btn-primary{background:linear-gradient(135deg,rgba(34,211,238,0.15),rgba(99,102,241,0.15));color:var(--text);border:1px solid rgba(99,130,180,0.3);}
.btn-primary:hover{background:linear-gradient(135deg,rgba(34,211,238,0.25),rgba(99,102,241,0.25));border-color:rgba(99,130,180,0.5);}

/* ===== PLATFORM LINK BAR ===== */
.platform-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(13,20,34,0.7);border:1px solid rgba(80,110,160,0.25);
  border-radius:10px;padding:10px 16px;margin-bottom:20px;
}
.platform-bar-path{
  flex:1;font-size:12px;color:var(--muted);font-family:'Courier New',monospace;
  display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.platform-bar-path svg{width:13px;height:13px;flex:none;color:#38bdf8;}
.platform-bar-path span{color:#67e8f9;}
.platform-bar-link{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(99,102,241,0.12));
  border:1px solid rgba(99,130,180,0.3);border-radius:7px;
  padding:6px 14px;font-size:12px;font-weight:600;color:var(--text);
  text-decoration:none;white-space:nowrap;transition:all 0.2s;flex:none;
}
.platform-bar-link:hover{background:linear-gradient(135deg,rgba(34,211,238,0.22),rgba(99,102,241,0.22));border-color:rgba(99,130,180,0.5);}
.platform-bar-link svg{width:12px;height:12px;}

/* ===== SCREENSHOT ZONE ===== */
.screenshot-zone{
  border:1px solid rgba(80,110,160,0.2);border-radius:14px;
  overflow:hidden;margin-bottom:22px;background:rgba(10,15,26,0.6);
}
.screenshot-label{
  display:flex;align-items:center;gap:8px;padding:9px 16px;
  border-bottom:1px solid rgba(80,110,160,0.15);
  font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
}
.screenshot-label svg{width:13px;height:13px;}
.screenshot-zone img{
  width:100%;display:block;max-height:480px;object-fit:cover;object-position:top;
}
.screenshot-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:40px 20px;color:var(--subtle);text-align:center;min-height:200px;
}
.screenshot-placeholder svg{width:36px;height:36px;opacity:0.35;}
.screenshot-placeholder p{font-size:12px;line-height:1.6;opacity:0.6;}
.screenshot-placeholder code{font-size:11px;background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:4px;color:var(--muted);}

/* ===== MISC ===== */
.overview-hero{background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(99,102,241,0.08));border:1px solid rgba(99,130,180,0.25);border-radius:18px;padding:28px 32px;margin-bottom:24px;}
.overview-hero h2{font-size:22px;font-weight:800;margin-bottom:8px;}
.overview-hero p{font-size:14px;color:var(--muted);line-height:1.7;max-width:600px;}
.role-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:20px;}
.info-table{width:100%;border-collapse:collapse;font-size:13px;}
.info-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.05);}
.info-table td:first-child{color:var(--muted);width:40%;font-weight:500;}
.info-table td:last-child{color:var(--text);font-family:'Courier New',monospace;font-size:12px;}
.info-table tr:last-child td{border-bottom:none;}
.routing-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.routing-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
.routing-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
.routing-table tr:last-child td{border-bottom:none;}
.routing-table tr:hover td{background:rgba(255,255,255,0.02);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

/* ===== ARCHITECTURE FLOW ANIMATIONS ===== */
@keyframes flowDash{to{stroke-dashoffset:-12;}}
@keyframes accentShimmer{
  0%{background-position:-200% center;}
  100%{background-position:200% center;}
}
@keyframes nodePulse{
  0%,100%{box-shadow:0 0 8px rgba(34,211,238,0.2);}
  50%{box-shadow:0 0 22px rgba(34,211,238,0.55);}
}
@keyframes nodePulseViolet{
  0%,100%{box-shadow:0 0 8px rgba(139,92,246,0.2);}
  50%{box-shadow:0 0 22px rgba(139,92,246,0.55);}
}
@keyframes nodePulseGreen{
  0%,100%{box-shadow:0 0 8px rgba(52,211,153,0.2);}
  50%{box-shadow:0 0 22px rgba(52,211,153,0.55);}
}
@keyframes colEnter{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes dotTravel{
  0%{offset-distance:0%;opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{offset-distance:100%;opacity:0;}
}
@keyframes borderPulse{
  0%,100%{opacity:0.5;}50%{opacity:1;}
}
/* flow column entrance with stagger */
.arch-col{animation:colEnter 0.5s ease both;}
.arch-col-1{animation-delay:0.05s;}
.arch-col-2{animation-delay:0.2s;}
.arch-col-3{animation-delay:0.35s;}
.arch-col-4{animation-delay:0.5s;}
/* animated top accent bar */
.arch-accent-cyan{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#22d3ee,#3b82f6,#22d3ee);
  background-size:200% auto;
  animation:accentShimmer 3s linear infinite;
}
.arch-accent-violet{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#8b5cf6,#6366f1,#8b5cf6);
  background-size:200% auto;
  animation:accentShimmer 3s linear infinite 0.5s;
}
.arch-accent-green{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#34d399,#22d3ee,#34d399);
  background-size:200% auto;
  animation:accentShimmer 3s linear infinite 1s;
}
.arch-accent-indigo{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#6366f1,#22d3ee,#6366f1);
  background-size:200% auto;
  animation:accentShimmer 3s linear infinite 0.8s;
}
/* animated result badge */
.arch-result-cyan{animation:nodePulse 2.5s ease-in-out infinite;}
.arch-result-violet{animation:nodePulseViolet 2.5s ease-in-out infinite 0.4s;}
.arch-result-green{animation:nodePulseGreen 2.5s ease-in-out infinite 0.8s;}
/* flowing SVG arrow */
.arch-arrow-path{
  stroke-dasharray:6 4;
  animation:flowDash 0.8s linear infinite;
}

/* ===== HAMBURGER BUTTON (mobile only) ===== */
.menu-btn{
  display:none;flex-direction:column;justify-content:center;gap:5px;
  width:36px;height:36px;background:rgba(255,255,255,0.06);
  border:1px solid var(--border);border-radius:8px;cursor:pointer;
  padding:8px 7px;flex:none;
}
.menu-btn span{display:block;height:2px;border-radius:1px;background:var(--muted);transition:all 0.2s;}
.menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;}
.menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* ===== SIDEBAR OVERLAY (mobile) ===== */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:49;backdrop-filter:blur(2px);
}
.sidebar-overlay.visible{display:block;}

/* ===== TABLET (≤900px) ===== */
@media(max-width:900px){
  .sidebar{width:240px;}
  .content{padding:24px 20px;}
  .grid-4,.grid-3{grid-template-columns:repeat(2,1fr);}
  .feature-grid{grid-template-columns:1fr 1fr;}
}

/* ===== MOBILE (≤640px) ===== */
@media(max-width:640px){
  /* Prevent horizontal overflow globally */
  body{overflow-x:hidden;}
  .content{overflow-x:hidden;}
  .content-inner{max-width:100%;overflow-x:hidden;}

  /* Header */
  .header{padding:12px 16px;flex-wrap:wrap;gap:8px;}
  .brand-text h1{font-size:15px;}
  .brand-text p{display:none;}
  .header-right{width:100%;justify-content:space-between;}
  .demo-selector{flex:1;overflow-x:auto;scrollbar-width:none;}
  .demo-selector::-webkit-scrollbar{display:none;}
  .demo-tab{padding:7px 12px;font-size:11px;white-space:nowrap;}
  .badge-live{display:none;}
  .menu-btn{display:flex;}

  /* Layout — sidebar becomes fixed drawer */
  .layout{height:calc(100vh - 109px);}
  .sidebar{
    position:fixed;left:-280px;top:109px;bottom:0;
    width:280px;z-index:50;
    transition:left 0.25s cubic-bezier(0.4,0,0.2,1);
    height:auto;
  }
  .sidebar.mobile-open{left:0;}

  /* Content full width */
  .content{padding:16px 14px;}

  /* Step header */
  .step-title{font-size:20px;}

  /* Grids */
  .grid-2{grid-template-columns:1fr;}
  .grid-3{grid-template-columns:1fr;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .feature-grid{grid-template-columns:1fr;}

  /* Nav buttons stack */
  .nav-buttons{flex-direction:column;gap:10px;}
  .btn{justify-content:center;width:100%;}

  /* Platform icons: 3 per row on mobile */
  [style*="grid-template-columns:repeat(5,1fr)"]{
    display:grid !important;
    grid-template-columns:repeat(3,1fr) !important;
  }

  /* Architecture flow: stack vertically on mobile */
  [style*="grid-template-columns:130px"],
  [style*="grid-template-columns:1fr 28px 1fr"],
  [style*="grid-template-columns:1fr 32px 1fr"]{
    display:flex !important;
    flex-direction:column !important;
    gap:0 !important;
  }
  /* Architecture columns: full width */
  .arch-col{
    width:100% !important;
    animation-delay:0s !important;
  }
  /* Arrow containers between columns: rotate to point down */
  [style*="grid-template-columns:130px"] > div:not(.arch-col),
  [style*="grid-template-columns:1fr 28px 1fr"] > div:not(.arch-col),
  [style*="grid-template-columns:1fr 32px 1fr"] > div:not(.arch-col){
    padding:6px 0 !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
  }
  [style*="grid-template-columns:130px"] > div:not(.arch-col) svg,
  [style*="grid-template-columns:1fr 28px 1fr"] > div:not(.arch-col) svg,
  [style*="grid-template-columns:1fr 32px 1fr"] > div:not(.arch-col) svg{
    transform:rotate(90deg);
  }

  /* Flow diagram rows: wrap or scroll */
  .flow-row{
    flex-wrap:wrap;
    gap:6px;
  }
  .flow-node{
    flex:1 1 auto;
    min-width:0;
    font-size:11px;
    padding:8px 10px;
    word-break:break-word;
  }
  .flow-arrow{font-size:14px;}

  /* Code blocks: horizontal scroll */
  .code-block{
    font-size:11px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    max-width:100%;
    word-break:normal;
  }

  /* Tables: scroll wrapper */
  .routing-table, .info-table{
    display:block;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    max-width:100%;
  }

  /* Step items: prevent overflow */
  .step-item{
    padding:10px 12px;
    max-width:100%;
    overflow:hidden;
  }
  .step-body{min-width:0;overflow-wrap:break-word;word-break:break-word;}
  .step-body strong{word-break:break-word;}

  /* Cards: prevent overflow */
  .card{max-width:100%;overflow:hidden;}

  /* Presenter box */
  .presenter-box{padding:14px 16px;}

  /* FAQ */
  .faq-card{padding:16px 14px;margin:14px 0 18px;}
  .faq-title{font-size:13px;margin-bottom:12px;}
  .faq-item{padding:14px 13px;}
  .faq-head{flex-direction:column;gap:6px;}
  .faq-q{font-size:14px;line-height:1.55;}
  .faq-a{font-size:13.5px;line-height:1.7;gap:8px;padding-left:10px;}
  .faq-a-body p + p{margin-top:8px;}
  .faq-evidence{margin-top:12px;border-radius:10px;}
  .faq-evidence img{max-height:220px;}

  /* Screenshots */
  .screenshot-zone img{max-height:200px;}

  /* Platform bar */
  .platform-bar{flex-wrap:wrap;gap:8px;}
  .platform-bar-path{font-size:11px;min-width:0;overflow:hidden;text-overflow:ellipsis;}

  /* Metric chips on mobile */
  .metric-val{font-size:22px;}
  .metric-chip{padding:12px;}

  /* Overview hero */
  .overview-hero{padding:20px 16px;}
  .overview-hero h2{font-size:18px;}

  /* Inline 3-col grids in content → 1 col */
  [style*="grid-template-columns:repeat(3,1fr)"]{
    grid-template-columns:1fr !important;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.5" fill="#fff"/></svg>
    </div>
    <div class="brand-text">
      <h1><span>AGIone</span> Platform</h1>
      <p>Interactive Demo Runbook</p>
    </div>
  </div>
  <div class="header-right">
    <div class="demo-selector">
      <button class="demo-tab active" onclick="switchDemo(1)">Demo 1 · On-Prem Deploy &amp; Publish</button>
      <button class="demo-tab" onclick="switchDemo(2)">Demo 2 · Aggregate Publish</button>
      <button class="demo-tab" onclick="switchDemo(3)">Demo 3 · Public Model Publish</button>
      <button class="demo-tab" onclick="switchDemo(4)">FAQ</button>
    </div>
    <div class="badge badge-live"><span class="live-dot"></span>demo.agione.pro</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<!-- Global registries — content files push into these -->
<script>
  const demos      = {};
  const contentMap = {};
</script>

<!-- Load content files -->
<script src="content/config.js"></script>
<script src="content/demo1.js"></script>
<script src="content/demo2.js"></script>
<script src="content/demo3.js"></script>
<script src="content/demo4.js"></script>

<script>
// ===== RENDER ENGINE =====

let currentDemo = 1;
let currentStep  = 0;

const phaseColors = {
  overview:{ dot:"#818cf8", badge:"phase-pr", border:"rgba(99,102,241,0.3)",  bg:"rgba(99,102,241,0.08)" },
  operator:{ dot:"#22d3ee", badge:"phase-op", border:"rgba(34,211,238,0.3)",  bg:"rgba(34,211,238,0.08)" },
  provider:{ dot:"#a78bfa", badge:"phase-pr", border:"rgba(139,92,246,0.3)",  bg:"rgba(139,92,246,0.08)" },
  enduser: { dot:"#34d399", badge:"phase-eu", border:"rgba(52,211,153,0.3)",  bg:"rgba(52,211,153,0.08)" },
  functions:{ dot:"#fbbf24", badge:"phase-fn", border:"rgba(251,191,36,0.3)", bg:"rgba(251,191,36,0.08)" }
};

const roleColors = {
  "Operator":"#22d3ee",
  "Provider":"#a78bfa",
  "End User":"#34d399"
};

function switchDemo(n){
  currentDemo = n;
  currentStep = 0;
  document.querySelectorAll('.demo-tab').forEach((t,i)=>t.classList.toggle('active',i===n-1));
  render();
}

function goStep(n){
  currentStep = n;
  render();
  document.getElementById('content').scrollTop = 0;
}

function render(){
  renderSidebar();
  renderContent();
}

function renderSidebar(){
  const demo = demos[currentDemo];
  let html = '';
  let lastPhase = null;
  let lastGroup = null;
  demo.steps.forEach((step,i)=>{
    if(step.groupLabel){
      if(step.groupLabel !== lastGroup){
        if(lastGroup) html += '<div class="nav-divider"></div>';
        const pc = phaseColors[step.phase];
        html += `<div class="phase-label"><span class="phase-badge ${pc.badge}">${step.groupLabel}</span></div>`;
        lastGroup = step.groupLabel;
      }
    } else if(step.phase !== lastPhase){
      if(lastPhase) html += '<div class="nav-divider"></div>';
      if(step.phase !== 'overview'){
        const pc = phaseColors[step.phase];
        html += `<div class="phase-label"><span class="phase-badge ${pc.badge}">${step.phaseLabel}</span></div>`;
      }
    }
    lastPhase = step.phase;
    const isActive = i === currentStep;
    const isDone   = i < currentStep;
    const pc = phaseColors[step.phase];
    html += `<div class="nav-item ${isActive?'active':''}" onclick="goStep(${i})">
      <div class="nav-num" style="background:${isActive?pc.bg:'rgba(255,255,255,0.04)'};border:1px solid ${isActive?pc.border:'rgba(255,255,255,0.07)'};color:${isActive?pc.dot:'var(--muted)'}">${i===0?'★':i}</div>
      <div><div class="nav-label" style="color:${isActive?'var(--text)':'var(--muted)'}">${step.title}</div></div>
      <div class="nav-status ${isDone?'done':isActive?'current':''}"></div>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderContent(){
  const demo  = demos[currentDemo];
  const step  = demo.steps[currentStep];
  const pc    = phaseColors[step.phase];
  const total = demo.steps.length;

  const prevBtn = currentStep > 0
    ? `<button class="btn btn-ghost" onclick="goStep(${currentStep-1})">← Previous</button>`
    : '<div></div>';
  const nextBtn = currentStep < total-1
    ? `<button class="btn btn-primary" onclick="goStep(${currentStep+1})">Next Step →</button>`
    : `<button class="btn btn-primary" onclick="goStep(0)">↩ Restart Demo</button>`;

  const contentFn = contentMap[step.content];
  const bodyHtml  = contentFn ? contentFn() : '<p style="color:var(--muted)">Content coming soon.</p>';

  // ── Platform link bar ────────────────────────────────────
  const cfg = (typeof stepConfig !== 'undefined' && stepConfig[step.id]) || {};
  let platformBarHtml = '';
  if(cfg.navPath || cfg.platformUrl){
    platformBarHtml = `
      <div class="platform-bar">
        <div class="platform-bar-path">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
          <span>${cfg.navPath || 'demo.agione.pro'}</span>
        </div>
        <a class="platform-bar-link" href="${cfg.platformUrl || 'https://demo.agione.pro'}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Open in Platform
        </a>
      </div>`;
  }

  // ── Screenshot zone ──────────────────────────────────────
  let screenshotHtml = '';
  if(cfg.screenshot){
    screenshotHtml = `
      <div class="screenshot-zone">
        <div class="screenshot-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Platform Screenshot
        </div>
        <img src="${cfg.screenshot}" alt="${step.title}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="screenshot-placeholder" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Screenshot not added yet.<br>Drop a PNG file here to add it:</p>
          <code>${cfg.screenshot}</code>
        </div>
      </div>`;
  }

  // ── Role tag ─────────────────────────────────────────────
  let roleHtml = '';
  if(step.role && step.phase !== 'functions'){
    roleHtml = `<div class="role-tag" style="background:${pc.bg};border:1px solid ${pc.border};color:${pc.dot}">
      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="currentColor" opacity="0.7"/></svg>
      ${step.role} Role
    </div>`;
  }

  const subtitleHtml = step.subtitle
    ? `<div class="step-subtitle">${step.subtitle}</div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="content-inner">
      <div class="step-header">
        <div class="step-eyebrow">
          <span class="step-phase-tag" style="background:${pc.bg};border:1px solid ${pc.border};color:${pc.dot}">${step.phaseLabel}</span>
          <span class="step-num-tag">Step ${currentStep + 1} of ${total}</span>
        </div>
        <div class="step-title">${step.title}</div>
        ${subtitleHtml}
      </div>
      ${platformBarHtml}
      ${screenshotHtml}
      ${roleHtml}
      ${bodyHtml}
      <div class="nav-buttons">${prevBtn}${nextBtn}</div>
    </div>`;
}

// ===== INIT =====
render();
</script>
</body>
</html>
